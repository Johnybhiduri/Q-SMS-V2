<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#3457f5" />
    <meta
      name="description"
      content="Q-SMS gives you disposable virtual numbers to receive SMS verification codes online — no SIM, no subscription, 180+ countries."
    />
    <title>Q-SMS — Receive SMS Online with Virtual Numbers</title>

    <!-- Fonts: one combined request, swap to avoid invisible-text flash -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap"
      rel="stylesheet"
    />

    <!-- Apply saved theme before paint to avoid a light/dark flash on load -->
    <script>
      (function () {
        var saved = localStorage.getItem("qsms-theme");
        if (saved === "dark") {
          document.documentElement.classList.add("dark");
          document.documentElement.style.colorScheme = "dark";
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
